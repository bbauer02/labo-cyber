version: '3.8'

services:
  # Base de données PostgreSQL
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cyberlab
      POSTGRES_USER: cyberlab
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cyberlab_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyberlab"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API (Node.js)
  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://cyberlab:${DB_PASSWORD:-cyberlab_secret}@db:5432/cyberlab
      JWT_SECRET: ${JWT_SECRET:-cyberlab_jwt_secret_change_me}
      LABTAINERS_PATH: /labtainers
      LABTAINERS_HOST_PATH: C:/Users/admin/Desktop/dockerlabs/Labtainers
      # CAPTURES_HOST_PATH retiré — pas de volume partagé (sécurité serveur)
      NODE_ENV: production
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../Labtainers:/labtainers:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  # Frontend (React + Vite, servi par Nginx)
  frontend:
    build: ./frontend
    networks:
      - internal

  # Reverse proxy Nginx
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal
      - lab_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
  lab_network:
    driver: bridge
    name: cyberlab_labs
